<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>TOP1 RANDOMIDEA</title>
<style>
:root{--bg:#ecf1f8;--card:#fff;--ink:#1f2937;--muted:#5f6b7a;--line:#dbe3ec}
*{box-sizing:border-box}body{margin:0;color:var(--ink);background:radial-gradient(circle at 18% 0%,#fff 0%,var(--bg) 58%,#e4ebf5 100%);font-family:"Segoe UI","Trebuchet MS","Verdana",sans-serif}
.wrap{width:min(1260px,calc(100% - 28px));margin:18px auto 34px}.hdr{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:22px}
h1{margin:0 0 8px;font-size:clamp(25px,3.2vw,36px);line-height:1.08}.intro{margin:0;color:var(--muted);line-height:1.5;font-size:15px}
h2{margin:20px 2px 10px;font-size:20px}.grid{margin-top:10px;display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.art{display:block;width:100%;aspect-ratio:720/320;border-bottom:1px solid var(--line);background:#fff}.meta{padding:12px 14px 14px;display:flex;flex-direction:column;gap:5px}
.meta strong{font-size:16px}.meta span{font-size:13px;color:var(--muted);line-height:1.35}code{font-family:Consolas,"Courier New",monospace;font-size:12px;color:#334155;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:6px;padding:1px 5px}
</style></head><body><main class="wrap"><section class="hdr"><h1>TOP1-RANDOMIDEA</h1><p class="intro">Experimental variants from TOP1 3-only inner-shadow baseline. Smaller text with two styles: scientific (lower index-like 3) and math (superscript-like 3). Character spacing remains consistent via fixed text length.</p></section>
<h2>Scientific Style (Lower 3)</h2><section class="grid" id="scientific"></section>
<h2>Math Style (Superscript 3)</h2><section class="grid" id="math"></section>
</main>
<script>
const threeFonts=["Consolas,'Courier New',monospace","Trebuchet MS,Verdana,sans-serif","Segoe UI,Tahoma,sans-serif","Gill Sans,Gill Sans MT,Calibri,sans-serif","Franklin Gothic Medium,Arial Narrow,sans-serif","Palatino Linotype,Book Antiqua,serif"];
const jitFont="Consolas,'Courier New',monospace";
function e(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
function baseSvg(content){return `<svg class="art" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320"><defs><filter id="inner" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB"><feGaussianBlur in="SourceAlpha" stdDeviation="2.02" result="blur"/><feComposite in="blur" in2="SourceAlpha" operator="in" result="inner"/><feFlood flood-color="#d4d4d8" flood-opacity=".86" result="lineTone"/><feComposite in="lineTone" in2="inner" operator="in" result="shade"/><feComposite in="shade" in2="SourceGraphic" operator="over"/></filter></defs><rect width="720" height="320" fill="#18181b"/><g transform="translate(66 76)"><rect x="0" y="0" width="588" height="168" rx="24" fill="#fafafa"/><rect x="18" y="18" width="552" height="132" rx="14" fill="#18181b"/><path d="M56 70l32 26-32 26" fill="none" stroke="#eab308" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/><path d="M356 96h124" stroke="#d4d4d8" stroke-width="10" stroke-linecap="round"/><rect x="322" y="60" width="12" height="72" fill="#eab308"/>${content}</g></svg>`;}
function scientificWordmark(f3){return `<text x="132" y="122" font-size="64" font-weight="800" fill="#fafafa" letter-spacing="0" textLength="170" lengthAdjust="spacingAndGlyphs"><tspan font-family="${e(jitFont)}">J</tspan><tspan dx="-1.1" font-family="${e(f3)}" font-size="42" dy="12" filter="url(#inner)">3</tspan><tspan dx="-1.0" dy="-12" font-family="${e(jitFont)}">IT</tspan></text>`;}
function mathWordmark(f3){return `<text x="132" y="124" font-size="64" font-weight="800" fill="#fafafa" letter-spacing="0" textLength="170" lengthAdjust="spacingAndGlyphs"><tspan font-family="${e(jitFont)}">J</tspan><tspan dx="-1.1" font-family="${e(f3)}" font-size="42" dy="-16" filter="url(#inner)">3</tspan><tspan dx="-1.0" dy="16" font-family="${e(jitFont)}">IT</tspan></text>`;}
function card(id,label,svg,font){return `<article class="card">${svg}<div class="meta"><strong>${id}</strong><span>${label}</span><span>3 font: <code>${e(font)}</code></span></div></article>`;}
document.getElementById("scientific").innerHTML=threeFonts.map((f,i)=>card(`TOP1-RS${String(i+1).padStart(2,"0")}`,"Smaller 3 placed lower (scientific index style)",baseSvg(scientificWordmark(f)),f)).join("");
document.getElementById("math").innerHTML=threeFonts.map((f,i)=>card(`TOP1-RM${String(i+1).padStart(2,"0")}`,"Smaller 3 aligned high (math superscript style)",baseSvg(mathWordmark(f)),f)).join("");
</script></body></html>
