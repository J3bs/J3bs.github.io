<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>TOP1 Mixed Font Options</title>
<style>
:root{--bg:#ecf1f8;--card:#fff;--ink:#1f2937;--muted:#5f6b7a;--line:#dbe3ec}
*{box-sizing:border-box}body{margin:0;color:var(--ink);background:radial-gradient(circle at 18% 0%,#fff 0%,var(--bg) 58%,#e4ebf5 100%);font-family:"Segoe UI","Trebuchet MS","Verdana",sans-serif}
.wrap{width:min(1260px,calc(100% - 28px));margin:18px auto 34px}.hdr{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:22px}
h1{margin:0 0 8px;font-size:clamp(25px,3.2vw,36px);line-height:1.08}.intro{margin:0;color:var(--muted);line-height:1.5;font-size:15px}
.grid{margin-top:18px;display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.art{display:block;width:100%;aspect-ratio:720/320;border-bottom:1px solid var(--line);background:#fff}.meta{padding:12px 14px 14px;display:flex;flex-direction:column;gap:5px}
.meta strong{font-size:16px}.meta span{font-size:13px;color:var(--muted);line-height:1.35}code{font-family:Consolas,"Courier New",monospace;font-size:12px;color:#334155;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:6px;padding:1px 5px}
</style></head><body><main class="wrap"><section class="hdr"><h1>TOP1: Mixed Letter Font Options</h1><p class="intro">20 mixed-font variants for <code>J</code>, <code>3</code>, and <code>IT</code>. Spacing and segment anchors are constrained to prevent overlap with vectors and between glyph groups.</p></section><section class="grid" id="proofs"></section></main>
<script>
const sets=[
["Consolas,'Courier New',monospace","Trebuchet MS,Verdana,sans-serif","Franklin Gothic Medium,Arial Narrow,sans-serif"],
["Gill Sans,Gill Sans MT,Calibri,sans-serif","Consolas,'Courier New',monospace","Segoe UI,Tahoma,sans-serif"],
["Palatino Linotype,Book Antiqua,serif","Verdana,Geneva,sans-serif","Tahoma,Geneva,sans-serif"],
["Century Gothic,Futura,sans-serif","Lucida Console,Monaco,monospace","Gill Sans,Gill Sans MT,Calibri,sans-serif"],
["Cambria,'Times New Roman',serif","Trebuchet MS,Verdana,sans-serif","Consolas,'Courier New',monospace"],
["Segoe UI,Tahoma,sans-serif","Palatino Linotype,Book Antiqua,serif","Century Gothic,Futura,sans-serif"],
["Franklin Gothic Medium,Arial Narrow,sans-serif","Gill Sans,Gill Sans MT,Calibri,sans-serif","Lucida Sans Unicode,Lucida Grande,sans-serif"],
["Verdana,Geneva,sans-serif","Cambria,'Times New Roman',serif","Consolas,'Courier New',monospace"],
["Bookman Old Style,Palatino Linotype,serif","Tahoma,Geneva,sans-serif","Trebuchet MS,Verdana,sans-serif"],
["Lucida Sans Unicode,Lucida Grande,sans-serif","Century Gothic,Futura,sans-serif","Palatino Linotype,Book Antiqua,serif"],
["Consolas,'Courier New',monospace","Gill Sans,Gill Sans MT,Calibri,sans-serif","Verdana,Geneva,sans-serif"],
["Segoe UI,Tahoma,sans-serif","Lucida Console,Monaco,monospace","Franklin Gothic Medium,Arial Narrow,sans-serif"],
["Trebuchet MS,Verdana,sans-serif","Cambria,'Times New Roman',serif","Gill Sans,Gill Sans MT,Calibri,sans-serif"],
["Century Gothic,Futura,sans-serif","Palatino Linotype,Book Antiqua,serif","Segoe UI,Tahoma,sans-serif"],
["Tahoma,Geneva,sans-serif","Consolas,'Courier New',monospace","Bookman Old Style,Palatino Linotype,serif"],
["Gill Sans,Gill Sans MT,Calibri,sans-serif","Verdana,Geneva,sans-serif","Lucida Sans Unicode,Lucida Grande,sans-serif"],
["Cambria,'Times New Roman',serif","Century Gothic,Futura,sans-serif","Trebuchet MS,Verdana,sans-serif"],
["Franklin Gothic Medium,Arial Narrow,sans-serif","Segoe UI,Tahoma,sans-serif","Palatino Linotype,Book Antiqua,serif"],
["Lucida Console,Monaco,monospace","Gill Sans,Gill Sans MT,Calibri,sans-serif","Tahoma,Geneva,sans-serif"],
["Verdana,Geneva,sans-serif","Consolas,'Courier New',monospace","Century Gothic,Futura,sans-serif"]
];
function e(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
function art(j,f3,it){return `<svg class="art" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320"><rect width="720" height="320" fill="#18181b"/><g transform="translate(66 76)"><rect x="0" y="0" width="588" height="168" rx="24" fill="#fafafa"/><rect x="18" y="18" width="552" height="132" rx="14" fill="#18181b"/><path d="M56 70l32 26-32 26" fill="none" stroke="#eab308" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/><path d="M356 96h124" stroke="#d4d4d8" stroke-width="10" stroke-linecap="round"/><rect x="322" y="60" width="12" height="72" fill="#eab308"/><text x="118" y="123" font-size="72" font-weight="800" fill="#fafafa" letter-spacing="0"><tspan font-family="${e(j)}">J</tspan><tspan dx="-1.8" font-family="${e(f3)}">3</tspan><tspan dx="-1.4" font-family="${e(it)}">IT</tspan></text></g></svg>`;}
function card(i,t){const id=`TOP1-M${String(i+1).padStart(2,"0")}`;return `<article class="card">${art(t[0],t[1],t[2])}<div class="meta"><strong>${id}</strong><span>J: <code>${e(t[0])}</code></span><span>3: <code>${e(t[1])}</code></span><span>IT: <code>${e(t[2])}</code></span></div></article>`;}
document.getElementById("proofs").innerHTML=sets.map((t,i)=>card(i,t)).join("");
</script></body></html>
