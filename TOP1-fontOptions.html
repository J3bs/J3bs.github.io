<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOP1 Font Options</title>
  <style>
    :root {
      --bg: #ecf1f8;
      --card: #ffffff;
      --ink: #1f2937;
      --muted: #5f6b7a;
      --line: #dbe3ec;
      --panel: #18181b;
      --surface: #fafafa;
      --primary: #eab308;
      --accent: #d4d4d8;
      --aux: #71717a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: radial-gradient(circle at 18% 0%, #ffffff 0%, var(--bg) 58%, #e4ebf5 100%);
      font-family: "Segoe UI", "Trebuchet MS", "Verdana", sans-serif;
    }
    .wrap {
      width: min(1220px, calc(100% - 28px));
      margin: 18px auto 34px;
    }
    header {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 22px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(25px, 3.2vw, 36px);
      line-height: 1.08;
    }
    .intro {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 15px;
    }
    .swatches {
      margin-top: 12px;
      display: flex;
      gap: 8px;
    }
    .swatch {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, .14);
    }
    h2 {
      margin: 22px 2px 10px;
      font-size: 19px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .art {
      display: block;
      width: 100%;
      aspect-ratio: 720/320;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .meta {
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .meta strong {
      font-size: 16px;
      letter-spacing: 0;
    }
    .meta span {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <h1>TOP1: Expanded Font Options</h1>
      <p class="intro">TOP1 remains locked to TOP3-1-1 mark geometry and Zinc Signal palette. This pass expands typography range so one candidate can clearly win on readability, authority, and technical fit.</p>
      <div class="swatches" aria-label="Palette">
        <span class="swatch" style="background:#18181b"></span>
        <span class="swatch" style="background:#fafafa"></span>
        <span class="swatch" style="background:#eab308"></span>
        <span class="swatch" style="background:#d4d4d8"></span>
        <span class="swatch" style="background:#71717a"></span>
      </div>
    </header>

    <h2>Technical Sans</h2>
    <section class="grid" id="tech"></section>

    <h2>Geometric / Humanist</h2>
    <section class="grid" id="geo"></section>

    <h2>Controlled Serif Hybrids</h2>
    <section class="grid" id="serif"></section>
  </main>

  <script>
    const fontGroups = {
      tech: [
        { id: "TOP1-F1", name: "Consolas", family: "Consolas, 'Courier New', monospace", weight: 700, spacing: 0 },
        { id: "TOP1-F2", name: "Lucida Console", family: "'Lucida Console', Monaco, monospace", weight: 700, spacing: 0.4 },
        { id: "TOP1-F3", name: "Courier Prime", family: "'Courier New', monospace", weight: 700, spacing: 0.2 },
        { id: "TOP1-F4", name: "Franklin Gothic", family: "'Franklin Gothic Medium', 'Arial Narrow', sans-serif", weight: 800, spacing: 0.6 },
        { id: "TOP1-F5", name: "Tahoma Heavy", family: "Tahoma, 'Geneva', sans-serif", weight: 800, spacing: 0.3 }
      ],
      geo: [
        { id: "TOP1-F6", name: "Trebuchet Bold", family: "'Trebuchet MS', 'Verdana', sans-serif", weight: 800, spacing: 0.7 },
        { id: "TOP1-F7", name: "Century Gothic", family: "'Century Gothic', 'Futura', sans-serif", weight: 700, spacing: 1.4 },
        { id: "TOP1-F8", name: "Gill Sans", family: "'Gill Sans', 'Gill Sans MT', Calibri, sans-serif", weight: 700, spacing: 1.0 },
        { id: "TOP1-F9", name: "Segoe UI Black", family: "'Segoe UI', 'Tahoma', sans-serif", weight: 900, spacing: 0.5 },
        { id: "TOP1-F10", name: "Verdana Bold", family: "Verdana, 'Geneva', sans-serif", weight: 800, spacing: 0.2 }
      ],
      serif: [
        { id: "TOP1-F11", name: "Palatino", family: "'Palatino Linotype', 'Book Antiqua', serif", weight: 700, spacing: 0.8 },
        { id: "TOP1-F12", name: "Georgia Bold", family: "Georgia, 'Times New Roman', serif", weight: 700, spacing: 0.4 },
        { id: "TOP1-F13", name: "Cambria Bold", family: "Cambria, 'Times New Roman', serif", weight: 700, spacing: 0.5 },
        { id: "TOP1-F14", name: "Bookman", family: "'Bookman Old Style', 'Palatino Linotype', serif", weight: 700, spacing: 0.9 },
        { id: "TOP1-F15", name: "Garamond Heavy", family: "Garamond, 'Times New Roman', serif", weight: 700, spacing: 1.0 }
      ]
    };

    function esc(text) {
      return String(text).replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[ch]));
    }

    function art(font) {
      return `<svg class="art" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img">
        <rect width="720" height="320" fill="#18181b"/>
        <g transform="translate(66 76)">
          <rect x="0" y="0" width="588" height="168" rx="24" fill="#fafafa"/>
          <rect x="18" y="18" width="552" height="132" rx="14" fill="#18181b"/>
          <path d="M56 70l32 26-32 26" fill="none" stroke="#eab308" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M356 96h124" stroke="#d4d4d8" stroke-width="10" stroke-linecap="round"/>
          <rect x="322" y="60" width="12" height="72" fill="#eab308"/>
          <text x="112" y="123" font-family="${esc(font.family)}" font-size="82" font-weight="${font.weight}" letter-spacing="${font.spacing}" fill="#fafafa">J3IT</text>
        </g>
      </svg>`;
    }

    function card(font) {
      return `<article class="card">
        ${art(font)}
        <div class="meta">
          <strong>${font.id} - ${font.name}</strong>
          <span>Weight: ${font.weight} | Letter spacing: ${font.spacing}px</span>
          <span>Stack: ${esc(font.family)}</span>
        </div>
      </article>`;
    }

    document.getElementById("tech").innerHTML = fontGroups.tech.map(card).join("");
    document.getElementById("geo").innerHTML = fontGroups.geo.map(card).join("");
    document.getElementById("serif").innerHTML = fontGroups.serif.map(card).join("");
  </script>
</body>
</html>
