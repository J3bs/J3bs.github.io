<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOP1 Font Options</title>
  <style>
    :root {
      --bg: #eef3f9;
      --card: #ffffff;
      --ink: #1f2937;
      --muted: #5f6b7a;
      --line: #dbe3ec;
      --panel: #18181b;
      --surface: #fafafa;
      --primary: #eab308;
      --accent: #d4d4d8;
      --aux: #71717a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: radial-gradient(circle at 18% 0%, #ffffff 0%, var(--bg) 60%, #e7edf5 100%);
      font-family: "Segoe UI", "Trebuchet MS", "Verdana", sans-serif;
    }
    .wrap {
      width: min(1120px, calc(100% - 28px));
      margin: 18px auto 34px;
    }
    header {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 22px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(25px, 3.2vw, 36px);
      line-height: 1.08;
    }
    .intro {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 15px;
    }
    .swatches {
      margin-top: 12px;
      display: flex;
      gap: 8px;
    }
    .swatch {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, .14);
    }
    .grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .art {
      display: block;
      width: 100%;
      aspect-ratio: 720/320;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .meta {
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .meta strong {
      font-size: 16px;
      letter-spacing: 0;
    }
    .meta span {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <h1>TOP1: Font Option Proofs</h1>
      <p class="intro">TOP1 is locked to the TOP3-1-1 geometry and Zinc Signal palette. This board varies only the wordmark typography so font selection can be evaluated in isolation.</p>
      <div class="swatches" aria-label="Palette">
        <span class="swatch" style="background:#18181b"></span>
        <span class="swatch" style="background:#fafafa"></span>
        <span class="swatch" style="background:#eab308"></span>
        <span class="swatch" style="background:#d4d4d8"></span>
        <span class="swatch" style="background:#71717a"></span>
      </div>
    </header>
    <section class="grid" id="proofs" aria-label="TOP1 font variants"></section>
  </main>
  <script>
    const fontOptions = [
      { id: "TOP1-F1", name: "Consolas", family: "Consolas, 'Courier New', monospace", weight: 700 },
      { id: "TOP1-F2", name: "Trebuchet", family: "'Trebuchet MS', 'Verdana', sans-serif", weight: 800 },
      { id: "TOP1-F3", name: "Segoe UI", family: "'Segoe UI', 'Tahoma', sans-serif", weight: 800 },
      { id: "TOP1-F4", name: "Gill Sans", family: "'Gill Sans', 'Gill Sans MT', Calibri, sans-serif", weight: 700 },
      { id: "TOP1-F5", name: "Franklin Gothic", family: "'Franklin Gothic Medium', 'Arial Narrow', sans-serif", weight: 800 },
      { id: "TOP1-F6", name: "Lucida Sans", family: "'Lucida Sans Unicode', 'Lucida Grande', sans-serif", weight: 700 },
      { id: "TOP1-F7", name: "Century Gothic", family: "'Century Gothic', 'Futura', sans-serif", weight: 700 },
      { id: "TOP1-F8", name: "Tahoma", family: "Tahoma, 'Geneva', sans-serif", weight: 800 },
      { id: "TOP1-F9", name: "Verdana", family: "Verdana, 'Geneva', sans-serif", weight: 800 },
      { id: "TOP1-F10", name: "Palatino Sans", family: "'Palatino Linotype', 'Book Antiqua', sans-serif", weight: 700 }
    ];

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function makeSvg(fontFamily, fontWeight) {
      return `<svg class="art" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-label="TOP1 font variant">
        <rect width="720" height="320" fill="#18181b"/>
        <g transform="translate(66 76)">
          <rect x="0" y="0" width="588" height="168" rx="24" fill="#fafafa"/>
          <rect x="18" y="18" width="552" height="132" rx="14" fill="#18181b"/>
          <path d="M56 70l32 26-32 26" fill="none" stroke="#eab308" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M356 96h124" stroke="#d4d4d8" stroke-width="10" stroke-linecap="round"/>
          <rect x="322" y="60" width="12" height="72" fill="#eab308"/>
          <text x="112" y="123" font-family="${escapeHtml(fontFamily)}" font-size="82" font-weight="${fontWeight}" fill="#fafafa" letter-spacing="0">J3IT</text>
        </g>
      </svg>`;
    }

    const container = document.getElementById("proofs");
    container.innerHTML = fontOptions.map((font) => {
      return `<article class="card">
        ${makeSvg(font.family, font.weight)}
        <div class="meta">
          <strong>${font.id}</strong>
          <span>Font: ${font.name}</span>
          <span>Family stack: ${escapeHtml(font.family)}</span>
        </div>
      </article>`;
    }).join("");
  </script>
</body>
</html>
